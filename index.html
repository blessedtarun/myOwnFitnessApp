<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Aesthetics Protocol</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Custom styles to prevent layout shifts */
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .hide { display: none !important; }
        /* Hide scrollbar for clean app-like feel */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans selection:bg-yellow-400/50 selection:text-yellow-50 overflow-hidden">

    <!-- Main App Container (Using 100dvh for mobile browser support) -->
    <div id="app" class="h-[100dvh] min-h-[100dvh] flex flex-col w-full overflow-hidden"></div>

    <!-- Application Logic -->
    <script>
        // --- AUDIO ENGINE ---
        const speak = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.1; 
                utterance.pitch = 1;
                utterance.volume = 1;
                window.speechSynthesis.speak(utterance);
            }
        };

        const playChime = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);

                const now = ctx.currentTime;
                
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(440, now); 
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1); 
                
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                
                osc.start(now);
                osc.stop(now + 1.0);
            } catch (e) {
                console.error("Audio play failed", e);
            }
        };

        // --- DATA STRUCTURE: DUAL WORKOUTS ---
        const generateId = (prefix, index) => `${prefix}-${index}`;

        const WEEKLY_PLAN_GYM = {
            1: [
                { name: "Machine Chest Press", duration: 0, reps: "3 x 8", description: "Gym: Push" },
                { name: "Incline Dumbbell Press", duration: 0, reps: "3 x 8", description: "Gym: Push (Light)" },
                { name: "Seated Shoulder Press", duration: 0, reps: "3 x 8", description: "Gym: Push (Machine)" },
                { name: "Dumbbell Lateral Raise", duration: 0, reps: "2 x 10", description: "Gym: Push" },
                { name: "Rope Triceps Pushdown", duration: 0, reps: "2 x 10", description: "Gym: Push" }
            ],
            2: [
                { name: "Leg Press Machine", duration: 0, reps: "3 x 10", description: "Gym: Legs (Light)" },
                { name: "Bodyweight Squat", duration: 0, reps: "3 x 8", description: "Gym: Legs" },
                { name: "Seated Leg Curl", duration: 0, reps: "3 x 10", description: "Gym: Legs" },
                { name: "Leg Extension", duration: 0, reps: "2 x 10", description: "Gym: Legs" },
                { name: "Standing Calf Raise", duration: 0, reps: "2 x 12", description: "Gym: Legs" }
            ],
            3: [
                { name: "Lat Pulldown", duration: 0, reps: "3 x 8", description: "Gym: Pull" },
                { name: "Seated Cable Row", duration: 0, reps: "3 x 8", description: "Gym: Pull" },
                { name: "One-arm DB Row (Left)", duration: 0, reps: "2 x 8", description: "Gym: Pull" },
                { name: "One-arm DB Row (Right)", duration: 0, reps: "2 x 8", description: "Gym: Pull" },
                { name: "Face Pull", duration: 0, reps: "2 x 10", description: "Gym: Pull" },
                { name: "Dumbbell Curl", duration: 0, reps: "2 x 10", description: "Gym: Pull" }
            ],
            4: [
                { name: "Gym Rest Day", duration: 0, reps: "Rest", description: "Gym: Recovery" }
            ],
            5: [
                { name: "Goblet Squat", duration: 0, reps: "3 x 8", description: "Gym: Full Body" },
                { name: "Dumbbell Bench Press", duration: 0, reps: "3 x 8", description: "Gym: Full Body" },
                { name: "Lat Pulldown", duration: 0, reps: "3 x 8", description: "Gym: Full Body" },
                { name: "Romanian Deadlift", duration: 0, reps: "2 x 8", description: "Gym: Full Body (Light)" }
            ],
            6: [
                { name: "Incline Walk", duration: 900, reps: 0, description: "Gym: Cardio (15 min)" },
                { name: "Hanging Knee Raise", duration: 0, reps: "2 x 10", description: "Gym: Core" },
                { name: "Cable Crunch", duration: 0, reps: "2 x 12", description: "Gym: Core" }
            ],
            7: [
                { name: "Incline Pushups", duration: 0, reps: "2 x 10", description: "Gym: Optional" },
                { name: "Machine Chest Fly", duration: 0, reps: "2 x 12", description: "Gym: Optional (Light)" },
                { name: "Lat Pulldown", duration: 0, reps: "2 x 12", description: "Gym: Optional (Light)" },
                { name: "Easy Incline Walk", duration: 600, reps: 0, description: "Gym: Optional (10 min)" }
            ]
        };

        const WEEKLY_PLAN_HOME = {
            1: [
                { name: "Plank", duration: 20, reps: 0, description: "Home: Core" },
                { name: "Plank", duration: 20, reps: 0, description: "Home: Core" },
                { name: "Dead Bug (Left)", duration: 0, reps: "8 reps", description: "Home: Core" },
                { name: "Dead Bug (Right)", duration: 0, reps: "8 reps", description: "Home: Core" },
                { name: "Child's Pose", duration: 60, reps: 0, description: "Home: Mobility" },
                { name: "Hip Flexor Stretch (L)", duration: 40, reps: 0, description: "Home: Mobility" },
                { name: "Hip Flexor Stretch (R)", duration: 40, reps: 0, description: "Home: Mobility" }
            ],
            2: [
                { name: "Cat-Cow Stretch", duration: 60, reps: 0, description: "Home: Recovery" },
                { name: "Hamstring Stretch (L)", duration: 40, reps: 0, description: "Home: Recovery" },
                { name: "Hamstring Stretch (R)", duration: 40, reps: 0, description: "Home: Recovery" },
                { name: "Deep Breathing", duration: 120, reps: 0, description: "Home: Recovery" }
            ],
            3: [
                { name: "Side Plank (L, knees down)", duration: 15, reps: 0, description: "Home: Core" },
                { name: "Side Plank (R, knees down)", duration: 15, reps: 0, description: "Home: Core" },
                { name: "Glute Bridge", duration: 0, reps: "2 x 12", description: "Home: Pelvic" },
                { name: "Slow Kegels", duration: 0, reps: "8 reps", description: "Home: Pelvic" },
                { name: "Reverse Kegels", duration: 0, reps: "8 breaths", description: "Home: Pelvic" }
            ],
            4: [
                { name: "Child's Pose", duration: 60, reps: 0, description: "Home: Light Mobility" },
                { name: "Seated Spinal Twist (L)", duration: 30, reps: 0, description: "Home: Light Mobility" },
                { name: "Seated Spinal Twist (R)", duration: 30, reps: 0, description: "Home: Light Mobility" },
                { name: "Deep Breathing", duration: 120, reps: 0, description: "Home: Light Mobility" }
            ],
            5: [
                { name: "Bird Dog (Left)", duration: 0, reps: "8 reps", description: "Home: Stability" },
                { name: "Bird Dog (Right)", duration: 0, reps: "8 reps", description: "Home: Stability" },
                { name: "Plank", duration: 25, reps: 0, description: "Home: Core" },
                { name: "Plank", duration: 25, reps: 0, description: "Home: Core" },
                { name: "Glute Bridge", duration: 0, reps: "2 x 15", description: "Home: Stability" }
            ],
            6: [
                { name: "Cat-Cow Stretch", duration: 60, reps: 0, description: "Home: Optional Mobility" },
                { name: "Hamstring Stretch (L)", duration: 40, reps: 0, description: "Home: Optional Mobility" },
                { name: "Hamstring Stretch (R)", duration: 40, reps: 0, description: "Home: Optional Mobility" },
                { name: "Child's Pose", duration: 60, reps: 0, description: "Home: Optional Mobility" }
            ],
            7: [
                { name: "Full Rest", duration: 0, reps: "Rest", description: "Home: Recovery" }
            ]
        };

        // Attach IDs
        Object.keys(WEEKLY_PLAN_GYM).forEach(day => {
            WEEKLY_PLAN_GYM[day] = WEEKLY_PLAN_GYM[day].map((e, i) => ({ ...e, id: generateId(`g${day}`, i) }));
        });
        Object.keys(WEEKLY_PLAN_HOME).forEach(day => {
            WEEKLY_PLAN_HOME[day] = WEEKLY_PLAN_HOME[day].map((e, i) => ({ ...e, id: generateId(`h${day}`, i) }));
        });

        // --- APP STATE ---
        const state = {
            view: 'HOME', // HOME, INTRO, WORKOUT, COMPLETED_SCREEN
            completedGymDays: [],
            completedHomeDays: [],
            activeDay: null,
            activeType: null, // 'GYM' or 'HOME'
            currentExIndex: 0,
            
            // Timer state
            targetDuration: 0,
            timeLeft: 0,
            isRunning: false,
            isFinished: false,
            timerInterval: null,
            lastTick: -1,
            
            showDaySelector: false
        };

        const today = new Date().getDay() || 7;

        // --- CORE FUNCTIONS ---

        function render() {
            const app = document.getElementById('app');
            let html = '';

            if (state.view === 'HOME') {
                html = getHomeHTML();
            } else if (state.view === 'INTRO') {
                html = getIntroHTML();
            } else if (state.view === 'WORKOUT') {
                html = getWorkoutHTML();
            } else if (state.view === 'COMPLETED_SCREEN') {
                html = getCompletedHTML();
            }

            app.innerHTML = html;
            lucide.createIcons(); 
            
            if (state.view === 'WORKOUT') {
                updateTimerUI(); 
            }
        }

        // Action Handlers
        window.resetProgress = () => {
            if(window.confirm('Wipe logs and restart?')) {
                state.completedGymDays = [];
                state.completedHomeDays = [];
                render();
            }
        };

        window.startWorkout = (day, type) => {
            state.activeDay = day;
            state.activeType = type;
            state.currentExIndex = 0;
            state.view = 'INTRO';
            render();
        };

        window.startPhase = () => {
            const queue = state.activeType === 'GYM' ? WEEKLY_PLAN_GYM[state.activeDay] : WEEKLY_PLAN_HOME[state.activeDay];
            const exercise = queue[state.currentExIndex];
            state.targetDuration = exercise.duration;
            state.timeLeft = exercise.duration;
            state.isRunning = false;
            state.isFinished = false;
            state.lastTick = -1;
            state.view = 'WORKOUT';
            render();
        };

        window.exitWorkout = () => {
            stopTimer();
            state.view = 'HOME';
            state.showDaySelector = false;
            render();
        };

        window.finishDay = () => {
            if (state.activeType === 'GYM') {
                if (!state.completedGymDays.includes(state.activeDay)) state.completedGymDays.push(state.activeDay);
            } else {
                if (!state.completedHomeDays.includes(state.activeDay)) state.completedHomeDays.push(state.activeDay);
            }
            state.view = 'COMPLETED_SCREEN';
            render();
        };

        window.returnHome = () => {
            state.view = 'HOME';
            render();
        };

        window.toggleDaySelector = () => {
            state.showDaySelector = !state.showDaySelector;
            const selector = document.getElementById('day-selector-dropdown');
            const chevron = document.getElementById('day-selector-chevron');
            if (selector) {
                if(state.showDaySelector) {
                    selector.classList.remove('hide');
                    chevron.classList.add('rotate-180');
                } else {
                    selector.classList.add('hide');
                    chevron.classList.remove('rotate-180');
                }
            }
        };

        window.changeDay = (newDay, newType) => {
            state.activeDay = newDay;
            state.activeType = newType;
            state.showDaySelector = false;
            state.currentExIndex = 0;
            stopTimer();
            state.view = 'INTRO';
            render();
        };

        window.handleNext = () => {
            const queue = state.activeType === 'GYM' ? WEEKLY_PLAN_GYM[state.activeDay] : WEEKLY_PLAN_HOME[state.activeDay];
            stopTimer();
            if (state.currentExIndex < queue.length - 1) {
                state.currentExIndex++;
                const exercise = queue[state.currentExIndex];
                state.targetDuration = exercise.duration;
                state.timeLeft = exercise.duration;
                state.isRunning = false;
                state.isFinished = false;
                state.lastTick = -1;
                render();
            } else {
                playChime();
                window.finishDay();
            }
        };

        window.handlePrev = () => {
            if (state.currentExIndex > 0) {
                stopTimer();
                state.currentExIndex--;
                const queue = state.activeType === 'GYM' ? WEEKLY_PLAN_GYM[state.activeDay] : WEEKLY_PLAN_HOME[state.activeDay];
                const exercise = queue[state.currentExIndex];
                state.targetDuration = exercise.duration;
                state.timeLeft = exercise.duration;
                state.isRunning = false;
                state.isFinished = false;
                state.lastTick = -1;
                render();
            }
        };

        // --- TIMER LOGIC ---
        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        window.toggleTimer = () => {
            state.isRunning = !state.isRunning;
            if (state.isRunning) {
                stopTimer();
                state.timerInterval = setInterval(tickTimer, 1000);
            } else {
                stopTimer();
            }
            render(); 
        };

        window.resetTimer = () => {
            stopTimer();
            state.isRunning = false;
            state.timeLeft = state.targetDuration;
            state.isFinished = false;
            state.lastTick = -1;
            render();
        };

        window.adjustTime = (event, seconds) => {
            event.stopPropagation();
            if (state.isRunning) return;
            const newTarget = Math.max(5, state.targetDuration + seconds);
            const diff = newTarget - state.targetDuration;
            state.targetDuration = newTarget;
            state.timeLeft = Math.max(0, state.timeLeft + diff);
            updateTimerUI();
        };

        function tickTimer() {
            if (state.timeLeft > 0) {
                state.timeLeft--;
                if (state.timeLeft <= 5 && state.timeLeft > 0 && state.timeLeft !== state.lastTick) {
                    speak(state.timeLeft.toString());
                    state.lastTick = state.timeLeft;
                }
                if (state.timeLeft === 0) {
                    playChime();
                    state.isRunning = false;
                    state.isFinished = true;
                    stopTimer();
                    render(); 
                    return;
                }
                updateTimerUI();
            } else {
                state.isRunning = false;
                state.isFinished = true;
                stopTimer();
                render();
            }
        }

        function formatTime(secs, isFinished, targetDuration) {
            if (targetDuration < 60 && !isFinished) return secs; 
            if (isFinished) return `<i data-lucide="check" class="w-12 h-12 md:w-16 md:h-16 text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)] mx-auto"></i>`;
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function updateTimerUI() {
            const textEl = document.getElementById('timer-text');
            const circleEl = document.getElementById('timer-circle');
            if (!textEl || !circleEl) return;

            const radius = 100;
            const stroke = 12;
            const circumference = (radius - stroke * 2) * 2 * Math.PI;
            
            const dashOffset = state.targetDuration > 0 
                ? circumference - (state.timeLeft / state.targetDuration) * circumference 
                : circumference;

            const isUrgent = state.timeLeft <= 5 && state.timeLeft > 0;
            
            if (state.isFinished) {
                textEl.innerHTML = formatTime(state.timeLeft, true, state.targetDuration);
                lucide.createIcons();
                circleEl.setAttribute('class', 'stroke-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)] transition-all duration-300 ease-linear');
            } else {
                textEl.innerText = formatTime(state.timeLeft, false, state.targetDuration);
                if (isUrgent) {
                    textEl.className = `absolute flex items-center justify-center w-full h-full ${state.targetDuration >= 600 ? 'text-4xl md:text-5xl' : 'text-5xl md:text-7xl'} font-black tracking-tighter text-red-500 drop-shadow-[0_0_12px_rgba(239,68,68,0.8)]`;
                    circleEl.setAttribute('class', 'stroke-red-500 drop-shadow-[0_0_12px_rgba(239,68,68,0.8)] transition-all duration-300 ease-linear');
                } else {
                    textEl.className = `absolute flex items-center justify-center w-full h-full ${state.targetDuration >= 600 ? 'text-4xl md:text-5xl' : 'text-5xl md:text-7xl'} font-black tracking-tighter text-zinc-50`;
                    circleEl.setAttribute('class', 'stroke-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)] transition-all duration-300 ease-linear');
                }
            }
            circleEl.style.strokeDashoffset = dashOffset;
        }

        // --- HTML TEMPLATES ---

        function getHomeHTML() {
            const totalCompleted = state.completedGymDays.length + state.completedHomeDays.length;
            const pct = Math.round((totalCompleted / 14) * 100);
            
            let daysHTML = '';
            for(let day=1; day<=7; day++) {
                const gymCompleted = state.completedGymDays.includes(day);
                const homeCompleted = state.completedHomeDays.includes(day);
                const isCurrent = day === today;
                const isFullyCompleted = gymCompleted && homeCompleted;
                
                let gymTitle = "";
                let homeTitle = "";
                
                if (day === 1) { gymTitle = "GYM: PUSH"; homeTitle = "HOME: CORE"; }
                if (day === 2) { gymTitle = "GYM: LEGS"; homeTitle = "HOME: RECOVER"; }
                if (day === 3) { gymTitle = "GYM: PULL"; homeTitle = "HOME: PELVIC"; }
                if (day === 4) { gymTitle = "GYM: REST"; homeTitle = "HOME: MOBILITY"; }
                if (day === 5) { gymTitle = "GYM: FULL BODY"; homeTitle = "HOME: STABILITY"; }
                if (day === 6) { gymTitle = "GYM: CARDIO"; homeTitle = "HOME: MOBILITY"; }
                if (day === 7) { gymTitle = "GYM: OPTIONAL"; homeTitle = "HOME: REST"; }

                const subtitleClass = isCurrent ? 'text-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)]' : 'text-zinc-500';

                const getBtnHTML = (type, title, isCompleted) => {
                    const btnClass = isCompleted 
                        ? 'bg-zinc-900 border-zinc-800 text-zinc-600' 
                        : 'bg-zinc-900 border-zinc-800 hover:bg-yellow-400 hover:text-black hover:shadow-[0_0_15px_rgba(250,204,21,0.4)] text-zinc-300';
                    
                    const iconHTML = isCompleted
                        ? '<i data-lucide="check" class="w-5 h-5 text-yellow-500"></i>'
                        : '<i data-lucide="arrow-up-right" class="w-5 h-5 opacity-50 group-hover:opacity-100"></i>';

                    return `
                        <button onclick="window.startWorkout(${day}, '${type}')" class="group flex-1 flex flex-col justify-between p-3 sm:p-4 border transition-all duration-300 rounded-md ${btnClass}">
                            <div class="w-full flex justify-between items-start mb-2">
                                <span class="text-[10px] font-bold uppercase tracking-widest opacity-70">${type}</span>
                                ${iconHTML}
                            </div>
                            <span class="text-sm sm:text-base font-black uppercase tracking-tighter text-left leading-tight ${isCompleted ? 'line-through' : ''}">
                                ${title.replace(`${type}: `, '')}
                            </span>
                        </button>
                    `;
                };

                daysHTML += `
                    <div class="w-full p-4 sm:p-6 md:p-8 border-b border-zinc-800 transition-all duration-300 ${isFullyCompleted ? 'bg-zinc-950/50' : 'bg-zinc-950'}">
                        <div class="mb-4 flex flex-col">
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-[0.2em] mb-1 ${subtitleClass}">
                                ${isCurrent ? 'Target: Today' : `Day 0${day}`}
                            </span>
                            <span class="text-2xl sm:text-3xl font-black uppercase tracking-tighter text-white ${isFullyCompleted ? 'opacity-30 line-through' : ''}">
                                Protocol ${day}
                            </span>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 sm:gap-4">
                            ${getBtnHTML('GYM', gymTitle, gymCompleted)}
                            ${getBtnHTML('HOME', homeTitle, homeCompleted)}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex-1 overflow-y-auto pb-12 w-full">
                    <header class="p-6 md:p-12 border-b border-zinc-800 pt-10">
                        <div class="flex justify-between items-start mb-8 md:mb-16">
                            <div class="max-w-[80%]">
                                <h1 class="text-4xl sm:text-5xl md:text-7xl font-black uppercase tracking-tighter leading-none mb-2">
                                    Dual<br/>
                                    <span class="bg-gradient-to-r from-yellow-200 via-yellow-400 to-amber-500 bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(250,204,21,0.6)]">Split.</span>
                                </h1>
                                <p class="text-zinc-500 text-[10px] sm:text-xs md:text-sm font-bold uppercase tracking-[0.2em] mt-4">Current Protocol // Gym + Home</p>
                            </div>
                            <button onclick="window.resetProgress()" class="text-zinc-600 hover:text-red-500 transition-colors p-2" title="Reset Data">
                                <i data-lucide="rotate-ccw" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                            </button>
                        </div>
                        <div class="mt-8">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-zinc-500 text-[10px] sm:text-xs font-bold uppercase tracking-[0.3em]">Weekly Payload</span>
                                <span class="text-3xl sm:text-4xl md:text-5xl font-black tracking-tighter">${totalCompleted}<span class="text-zinc-700">/14</span></span>
                            </div>
                            <div class="w-full h-1 sm:h-2 md:h-4 bg-zinc-900 border border-zinc-800">
                                <div class="h-full bg-gradient-to-r from-yellow-200 via-yellow-400 to-amber-500 shadow-[0_0_15px_rgba(250,204,21,0.5)] transition-all duration-1000 ease-out" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    </header>
                    <main class="max-w-5xl mx-auto">
                        <div class="px-6 py-3 sm:py-4 border-b border-zinc-800 flex items-center gap-3">
                            <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(250,204,21,1)]"></div>
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Execution Plan</span>
                        </div>
                        <div class="flex flex-col">
                            ${daysHTML}
                        </div>
                    </main>
                </div>
            `;
        }

        function getIntroHTML() {
            const dayId = state.activeDay;
            const type = state.activeType;
            
            return `
                <div class="flex-1 flex flex-col bg-zinc-950 items-center justify-center p-6 sm:p-8 text-center h-full w-full z-40">
                    <div class="animate-in fade-in slide-in-from-bottom-8 duration-700 w-full max-w-2xl">
                        <h3 class="text-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)] text-xs sm:text-sm md:text-xl font-bold tracking-[0.3em] uppercase mb-4">Session Initiated</h3>
                        <h1 class="text-zinc-50 text-5xl sm:text-7xl md:text-9xl font-black uppercase tracking-tighter leading-none mb-4 drop-shadow-2xl">
                            ${type}
                        </h1>
                        <h2 class="text-zinc-600 text-xl sm:text-3xl font-black uppercase tracking-widest mb-12">
                            DAY 0${dayId}
                        </h2>
                        <button onclick="window.startPhase()" class="w-full group relative p-4 sm:p-6 md:p-8 bg-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.6)] text-black text-xl sm:text-2xl md:text-4xl font-black uppercase flex items-center justify-between hover:bg-yellow-300 transition-all">
                            <span>BEGIN PHASE</span>
                            <i data-lucide="arrow-right" class="w-8 h-8 sm:w-10 sm:h-10 group-hover:translate-x-2 sm:group-hover:translate-x-4 transition-transform"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function getWorkoutHTML() {
            const queue = state.activeType === 'GYM' ? WEEKLY_PLAN_GYM[state.activeDay] : WEEKLY_PLAN_HOME[state.activeDay];
            const exercise = queue[state.currentExIndex];
            const totalInQueue = queue.length;
            const progressPercent = ((state.currentExIndex) / totalInQueue) * 100;
            const hasTimer = exercise.duration > 0;

            let daySelectorHTML = '';
            ['GYM','HOME'].forEach(t => {
                [1,2,3,4,5,6,7].forEach(d => {
                    daySelectorHTML += `
                        <button onclick="window.changeDay(${d}, '${t}')" class="px-4 sm:px-6 py-3 text-left text-xs font-bold text-zinc-400 uppercase tracking-widest hover:bg-yellow-400 hover:text-black hover:shadow-[0_0_15px_rgba(250,204,21,0.5)] transition-all border-b border-zinc-800 last:border-0 w-full">
                            ${t} - Day ${d}
                        </button>
                    `;
                });
            });

            // Timer or Reps HTML
            let displayHTML = '';
            if (hasTimer) {
                const radius = 100;
                const stroke = 12;
                const normalizedRadius = radius - stroke * 2;
                
                let controlsHTML = '';
                if (!state.isRunning && !state.isFinished) {
                    controlsHTML = `
                        <div class="flex border border-zinc-800 rounded-md overflow-hidden mt-6 shadow-[0_0_15px_rgba(0,0,0,0.4)] animate-in fade-in slide-in-from-bottom-2 max-w-full w-auto mx-auto justify-center">
                           <button onclick="window.adjustTime(event, -60)" class="px-2 sm:px-3 md:px-4 py-2 sm:py-3 bg-zinc-950 text-zinc-500 hover:text-yellow-400 hover:bg-zinc-900 hover:shadow-[inset_0_0_10px_rgba(250,204,21,0.2)] transition-all text-[9px] sm:text-[10px] md:text-xs font-black tracking-widest border-r border-zinc-800 flex-1">-1M</button>
                           <button onclick="window.adjustTime(event, -15)" class="px-2 sm:px-3 md:px-4 py-2 sm:py-3 bg-zinc-950 text-zinc-500 hover:text-yellow-400 hover:bg-zinc-900 hover:shadow-[inset_0_0_10px_rgba(250,204,21,0.2)] transition-all text-[9px] sm:text-[10px] md:text-xs font-black tracking-widest border-r border-zinc-800 flex-1">-15S</button>
                           <div class="px-2 sm:px-4 md:px-6 py-2 sm:py-3 bg-zinc-900 text-zinc-300 text-[9px] sm:text-[10px] md:text-xs font-bold tracking-[0.2em] flex items-center justify-center uppercase whitespace-nowrap">Adjust</div>
                           <button onclick="window.adjustTime(event, 15)" class="px-2 sm:px-3 md:px-4 py-2 sm:py-3 bg-zinc-950 text-zinc-500 hover:text-yellow-400 hover:bg-zinc-900 hover:shadow-[inset_0_0_10px_rgba(250,204,21,0.2)] transition-all text-[9px] sm:text-[10px] md:text-xs font-black tracking-widest border-l border-zinc-800 flex-1">+15S</button>
                           <button onclick="window.adjustTime(event, 60)" class="px-2 sm:px-3 md:px-4 py-2 sm:py-3 bg-zinc-950 text-zinc-500 hover:text-yellow-400 hover:bg-zinc-900 hover:shadow-[inset_0_0_10px_rgba(250,204,21,0.2)] transition-all text-[9px] sm:text-[10px] md:text-xs font-black tracking-widest border-l border-zinc-800 flex-1">+1M</button>
                        </div>
                    `;
                }

                displayHTML = `
                    <div onclick="window.toggleTimer()" class="cursor-pointer group w-full mt-2 sm:mt-4 flex flex-col items-center">
                        <div class="relative flex items-center justify-center w-full max-w-[200px] sm:max-w-[250px] aspect-square mx-auto">
                            <svg height="100%" width="100%" viewBox="0 0 ${radius * 2} ${radius * 2}" class="transform -rotate-90">
                                <circle stroke="#27272a" strokeWidth="${stroke}" fill="transparent" r="${normalizedRadius}" cx="${radius}" cy="${radius}" />
                                <circle id="timer-circle" stroke="currentColor" class="stroke-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)] transition-all duration-300 ease-linear" strokeWidth="${stroke}" fill="transparent" r="${normalizedRadius}" cx="${radius}" cy="${radius}" strokeLinecap="butt" />
                            </svg>
                            <div id="timer-text" class="absolute flex items-center justify-center w-full h-full ${state.targetDuration >= 600 ? 'text-4xl sm:text-5xl' : 'text-5xl sm:text-6xl md:text-7xl'} font-black tracking-tighter text-zinc-50">
                                <!-- updated by JS -->
                            </div>
                        </div>
                        <div class="text-center mt-4 sm:mt-8 text-[10px] sm:text-xs font-bold opacity-40 uppercase tracking-widest group-hover:opacity-80 transition">
                            ${state.isRunning ? 'Tap to Pause' : 'Tap to Start'}
                        </div>
                    </div>
                    ${controlsHTML}
                `;
            } else {
                displayHTML = `
                    <div class="flex flex-col items-center justify-center mt-2 sm:mt-4">
                        <span class="text-6xl sm:text-7xl md:text-8xl leading-none font-black bg-gradient-to-r from-yellow-200 via-yellow-400 to-amber-500 bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(250,204,21,0.6)] tracking-tighter text-center">
                            ${exercise.reps}
                        </span>
                        <span class="text-lg sm:text-xl md:text-2xl font-bold uppercase tracking-[0.2em] text-zinc-500 mt-4 sm:mt-6">
                            Target
                        </span>
                    </div>
                `;
            }

            // Main Action Button
            let actionBtn = '';
            if (hasTimer && !state.isFinished) {
                let btnClasses = state.isRunning 
                    ? "bg-zinc-100 text-black hover:bg-white shadow-[0_0_15px_rgba(255,255,255,0.4)]"
                    : "bg-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.6)] text-black hover:bg-yellow-300";
                actionBtn = `
                    <button onclick="window.toggleTimer()" class="col-span-2 flex items-center justify-center p-3 sm:p-4 text-base sm:text-lg md:text-2xl font-black uppercase tracking-tighter transition-all ${btnClasses}">
                        ${state.isRunning ? 'Pause' : 'Start'}
                    </button>
                `;
            } else {
                actionBtn = `
                    <button onclick="window.handleNext()" class="col-span-2 flex items-center justify-center p-3 sm:p-4 text-base sm:text-lg md:text-2xl font-black uppercase tracking-tighter transition-all bg-white text-black hover:bg-zinc-200 shadow-[0_0_15px_rgba(255,255,255,0.4)]">
                        ${hasTimer ? 'Continue' : 'Complete'}
                    </button>
                `;
            }

            return `
                <div class="flex flex-col h-full bg-zinc-950 text-zinc-50 relative w-full overflow-hidden">
                    <!-- Progress Bar -->
                    <div class="absolute top-0 left-0 h-1 md:h-2 bg-zinc-800 w-full z-20">
                        <div class="h-full bg-gradient-to-r from-yellow-200 via-yellow-400 to-amber-500 shadow-[0_0_15px_rgba(250,204,21,0.6)] transition-all duration-500" style="width: ${progressPercent}%"></div>
                    </div>

                    <!-- Top Navigation inside flow -->
                    <div class="w-full flex justify-between items-start z-40 p-4 pt-6">
                        <button onclick="window.exitWorkout()" class="bg-zinc-900 text-zinc-500 hover:text-white p-2 sm:p-3 border border-zinc-800 transition-colors">
                            <i data-lucide="x" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </button>

                        <div class="relative">
                            <button onclick="window.toggleDaySelector()" class="flex items-center gap-2 sm:gap-3 px-4 sm:px-6 py-2 sm:py-3 bg-zinc-900 border border-zinc-800 text-white font-bold text-[10px] sm:text-sm tracking-widest uppercase hover:bg-zinc-800 transition-colors">
                                <span>Switch Routine</span>
                                <i id="day-selector-chevron" data-lucide="chevron-down" class="w-3 h-3 sm:w-4 sm:h-4 transform transition ${state.showDaySelector ? 'rotate-180' : ''}"></i>
                            </button>
                            
                            <div id="day-selector-dropdown" class="${state.showDaySelector ? '' : 'hide'} absolute top-full right-0 mt-2 w-48 sm:w-56 bg-zinc-900 border border-zinc-800 flex flex-col shadow-[0_10px_30px_rgba(0,0,0,0.8)] z-50 max-h-[60vh] overflow-y-auto">
                                ${daySelectorHTML}
                            </div>
                        </div>
                    </div>

                    <!-- Header Info -->
                    <div class="px-4 sm:px-6 pb-2 flex justify-between items-center z-10 border-b border-zinc-900">
                        <span class="text-zinc-500 text-[10px] sm:text-xs md:text-sm font-bold tracking-[0.2em] uppercase">
                            Exercise ${state.currentExIndex + 1} / ${totalInQueue}
                        </span>
                        <span class="text-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)] text-[9px] sm:text-[10px] md:text-sm font-bold tracking-[0.2em] uppercase">
                            ${state.activeType} SPLIT
                        </span>
                    </div>

                    <!-- Main Content Area -->
                    <div class="flex-1 flex flex-col z-10 p-4 sm:p-6 md:p-8 overflow-y-auto justify-center">
                        <div class="mb-4 sm:mb-8 text-center md:text-left">
                            <h2 class="text-2xl sm:text-4xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter leading-tight mb-2 sm:mb-4 break-words">
                                ${exercise.name}
                            </h2>
                            <p class="text-zinc-400 text-xs sm:text-sm md:text-lg font-medium max-w-2xl border-l-4 border-yellow-400 shadow-[-4px_0_15px_-4px_rgba(250,204,21,0.6)] pl-3 sm:pl-4 text-left mx-auto md:mx-0">
                                ${exercise.description}
                            </p>
                        </div>

                        <div class="flex-1 flex flex-col items-center justify-center w-full">
                            ${displayHTML}
                        </div>
                    </div>

                    <!-- Bottom Controls -->
                    <div class="w-full bg-zinc-900 border-t border-zinc-800 p-3 sm:p-4 z-20 pb-4 sm:pb-8">
                        <div class="grid grid-cols-4 gap-2 md:gap-4 max-w-4xl mx-auto">
                            <button onclick="window.handlePrev()" class="col-span-1 flex items-center justify-center p-3 sm:p-4 bg-zinc-950 text-zinc-400 hover:text-white hover:bg-zinc-800 transition-colors uppercase font-bold text-[10px] sm:text-xs tracking-widest">
                                <i data-lucide="skip-back" class="w-5 h-5 sm:w-6 sm:h-6 md:mr-2"></i> <span class="hidden md:inline">Prev</span>
                            </button>

                            ${actionBtn}

                            <button onclick="window.resetTimer()" class="col-span-1 flex items-center justify-center p-3 sm:p-4 bg-zinc-950 text-zinc-400 hover:text-white hover:bg-zinc-800 transition-colors uppercase font-bold text-[10px] sm:text-xs tracking-widest">
                                <i data-lucide="rotate-ccw" class="w-5 h-5 sm:w-6 sm:h-6 md:mr-2"></i> <span class="hidden md:inline">Reset</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getCompletedHTML() {
            return `
                <div class="flex-1 h-full bg-zinc-950 flex flex-col items-center justify-center text-white p-6 sm:p-8 text-center w-full">
                    <div class="animate-in fade-in slide-in-from-bottom-8 duration-500 flex flex-col items-center w-full max-w-xl">
                        <div class="text-black p-6 sm:p-8 mb-6 sm:mb-8 border-4 border-white bg-gradient-to-r from-yellow-200 via-yellow-400 to-amber-500 shadow-[0_0_40px_rgba(250,204,21,0.6)]">
                            <i data-lucide="check" class="w-16 h-16 sm:w-20 sm:h-20" style="stroke-width: 3;"></i>
                        </div>
                        <h1 class="text-5xl sm:text-6xl md:text-8xl font-black uppercase tracking-tighter mb-4 sm:mb-6 drop-shadow-2xl">Obliterated</h1>
                        <p class="text-zinc-500 text-lg sm:text-xl md:text-2xl tracking-widest uppercase font-bold mb-8 sm:mb-12">${state.activeType} Session Logged.</p>
                        <button onclick="window.returnHome()" class="w-full bg-white text-black py-4 sm:py-6 text-xl sm:text-2xl font-black uppercase tracking-tighter hover:bg-yellow-400 hover:shadow-[0_0_20px_rgba(250,204,21,0.6)] transition-all">
                            Return to Base
                        </button>
                    </div>
                </div>
            `;
        }

        // Initialize App
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
