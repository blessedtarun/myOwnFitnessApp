<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER SYSTEM UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@500;600;700&display=swap');
        
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: #050505;
            color: #e4e4e7;
        }
        .font-system { font-family: 'JetBrains Mono', monospace; }
        .hide { display: none !important; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* Solo Leveling Glowing Panels */
        .system-panel {
            background: rgba(8, 14, 20, 0.85);
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .system-panel-active {
            background: rgba(12, 24, 40, 0.95);
            border: 1px solid rgba(34, 211, 238, 0.8);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4), inset 0 0 20px rgba(34, 211, 238, 0.2);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.8);
        }
    </style>
</head>
<body class="selection:bg-cyan-500/50 selection:text-cyan-50 overflow-hidden">

    <!-- Main App Container -->
    <div id="app" class="h-[100dvh] min-h-[100dvh] flex flex-col w-full overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-black to-black"></div>

    <script>
        const speak = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.1; 
                utterance.pitch = 0.8; // Deeper, system-like voice
                utterance.volume = 1;
                window.speechSynthesis.speak(utterance);
            }
        };

        const playChime = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);

                const now = ctx.currentTime;
                
                // Digital System "Ping" sound
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(880, now); 
                osc.frequency.exponentialRampToValueAtTime(1760, now + 0.1); 
                
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                
                osc.start(now);
                osc.stop(now + 0.5);
            } catch (e) {
                console.error("Audio play failed", e);
            }
        };

        const generateId = (prefix, index) => `${prefix}-${index}`;

        const WARMUP = [
            { name: "Treadmill Walk", duration: 180, reps: 0, description: "SYSTEM WARMUP: 3 minutes steady." },
            { name: "Arm Circles", duration: 20, reps: 0, description: "SYSTEM WARMUP: Joint mobility." },
            { name: "Shoulder Rolls", duration: 20, reps: 0, description: "SYSTEM WARMUP: Forward/Back." },
            { name: "Bodyweight Squats", duration: 0, reps: "10 reps", description: "SYSTEM WARMUP: Blood flow." },
            { name: "Cat-Cow", duration: 0, reps: "10 reps", description: "SYSTEM WARMUP: Spinal mobility." }
        ];

        const WEEKLY_PLAN = {
            1: [
                ...WARMUP,
                { name: "Lat Pulldown", duration: 0, reps: "3 x 10", description: "Medium grip. Pull to upper chest. 2 sec down." },
                { name: "Machine Chest Press", duration: 0, reps: "3 x 10", description: "Width Day. Control." },
                { name: "Seated Cable Row", duration: 0, reps: "3 x 10", description: "Squeeze the back." },
                { name: "Dumbbell Lateral Raise", duration: 0, reps: "3 x 15", description: "CRITICAL: Light weight, slight forward, elbows > wrists." },
                { name: "Rope Tricep Pushdown", duration: 0, reps: "3 x 12", description: "Lockout at bottom." },
                { name: "Dumbbell Curl", duration: 0, reps: "3 x 12", description: "Bicep isolation." }
            ],
            2: [
                ...WARMUP,
                { name: "Leg Press", duration: 0, reps: "3 x 12", description: "Lower body driver." },
                { name: "Romanian Deadlift", duration: 0, reps: "2 x 10", description: "Light weight. Stretch hamstrings." },
                { name: "Seated Leg Curl", duration: 0, reps: "3 x 12", description: "Hamstring contraction." },
                { name: "Leg Extension", duration: 0, reps: "2 x 12", description: "Quad sweep." },
                { name: "Standing Calf Raise", duration: 0, reps: "2 x 15", description: "ONLY TWO SETS." },
                { name: "Plank (Set 1)", duration: 20, reps: 0, description: "Core engagement." },
                { name: "Plank (Set 2)", duration: 20, reps: 0, description: "Core engagement." }
            ],
            3: [
                { name: "Active Recovery", duration: 0, reps: "Walk", description: "No Gym. 10-20 min walk if possible." }
            ],
            4: [
                ...WARMUP,
                { name: "Incline Dumbbell Press", duration: 0, reps: "3 x 10", description: "Upper chest focus." },
                { name: "Lat Pulldown", duration: 0, reps: "3 x 10", description: "Lats." },
                { name: "Shoulder Press Machine", duration: 0, reps: "2 x 10", description: "Don't overdo it. Fatigue quickly." },
                { name: "Rear Delt Fly Machine", duration: 0, reps: "3 x 15", description: "EXTREMELY IMPORTANT." },
                { name: "Cable Lateral Raise", duration: 0, reps: "3 x 12", description: "Constant tension." },
                { name: "Hammer Curl", duration: 0, reps: "2 x 12", description: "Brachialis." },
                { name: "Rope Pushdown", duration: 0, reps: "2 x 12", description: "Triceps." }
            ],
            5: [
                ...WARMUP,
                { name: "Lateral Raise", duration: 0, reps: "4 x 15", description: "GREEK GOD DAY. Shoulder width." },
                { name: "Rear Delt Fly", duration: 0, reps: "4 x 15", description: "3D Delts." },
                { name: "Incline Press", duration: 0, reps: "3 x 10", description: "Upper chest shelf." },
                { name: "Cable Row", duration: 0, reps: "3 x 10", description: "Back thickness." },
                { name: "Face Pull", duration: 0, reps: "3 x 15", description: "Shoulder health." },
                { name: "Incline Walk", duration: 600, reps: 0, description: "10 minutes." }
            ],
            6: [
                ...WARMUP,
                { name: "Incline Walk", duration: 900, reps: 0, description: "15 mins. Speed: 5-6 km/h, Inc: 5-10%." },
                { name: "Hanging Knee Raise", duration: 0, reps: "2 x 10", description: "Lower core." },
                { name: "Dead Bug", duration: 0, reps: "2 x 10", description: "10 per side." },
                { name: "Bird Dog", duration: 0, reps: "2 x 10", description: "10 per side." },
                { name: "Child Pose", duration: 60, reps: 0, description: "1 minute hold." }
            ],
            7: [
                { name: "Rest Day", duration: 0, reps: "Rest", description: "Nothing. No guilt." }
            ]
        };

        // Attach IDs
        Object.keys(WEEKLY_PLAN).forEach(day => {
            WEEKLY_PLAN[day] = WEEKLY_PLAN[day].map((e, i) => ({ ...e, id: generateId(`d${day}`, i) }));
        });

        const state = {
            view: 'HOME', // HOME, INTRO, WORKOUT, COMPLETED_SCREEN
            completedDays: [],
            activeDay: null,
            currentExIndex: 0,
            
            // Timer state
            targetDuration: 0,
            timeLeft: 0,
            isRunning: false,
            isFinished: false,
            timerInterval: null,
            lastTick: -1,
            
            showDaySelector: false
        };

        const today = new Date().getDay() || 7;

        function render() {
            const app = document.getElementById('app');
            let html = '';

            if (state.view === 'HOME') {
                html = getHomeHTML();
            } else if (state.view === 'INTRO') {
                html = getIntroHTML();
            } else if (state.view === 'WORKOUT') {
                html = getWorkoutHTML();
            } else if (state.view === 'COMPLETED_SCREEN') {
                html = getCompletedHTML();
            }

            app.innerHTML = html;
            lucide.createIcons(); 
            
            if (state.view === 'WORKOUT') {
                updateTimerUI(); 
            }
        }

        window.resetProgress = () => {
            if(window.confirm('[ SYSTEM PROMPT: WIPE PLAYER CACHE? ]')) {
                state.completedDays = [];
                render();
            }
        };

        window.startWorkout = (day) => {
            state.activeDay = day;
            state.currentExIndex = 0;
            state.view = 'INTRO';
            render();
        };

        window.startPhase = () => {
            const queue = WEEKLY_PLAN[state.activeDay];
            const exercise = queue[state.currentExIndex];
            state.targetDuration = exercise.duration;
            state.timeLeft = exercise.duration;
            state.isRunning = false;
            state.isFinished = false;
            state.lastTick = -1;
            state.view = 'WORKOUT';
            render();
        };

        window.exitWorkout = () => {
            stopTimer();
            state.view = 'HOME';
            state.showDaySelector = false;
            render();
        };

        window.finishDay = () => {
            if (!state.completedDays.includes(state.activeDay)) {
                state.completedDays.push(state.activeDay);
            }
            state.view = 'COMPLETED_SCREEN';
            render();
        };

        window.returnHome = () => {
            state.view = 'HOME';
            render();
        };

        window.toggleDaySelector = () => {
            state.showDaySelector = !state.showDaySelector;
            const selector = document.getElementById('day-selector-dropdown');
            const chevron = document.getElementById('day-selector-chevron');
            if (selector) {
                if(state.showDaySelector) {
                    selector.classList.remove('hide');
                    chevron.classList.add('rotate-180');
                } else {
                    selector.classList.add('hide');
                    chevron.classList.remove('rotate-180');
                }
            }
        };

        window.changeDay = (newDay) => {
            state.activeDay = newDay;
            state.showDaySelector = false;
            state.currentExIndex = 0;
            stopTimer();
            state.view = 'INTRO';
            render();
        };

        window.handleNext = () => {
            const queue = WEEKLY_PLAN[state.activeDay];
            stopTimer();
            if (state.currentExIndex < queue.length - 1) {
                state.currentExIndex++;
                const exercise = queue[state.currentExIndex];
                state.targetDuration = exercise.duration;
                state.timeLeft = exercise.duration;
                state.isRunning = false;
                state.isFinished = false;
                state.lastTick = -1;
                render();
            } else {
                playChime();
                window.finishDay();
            }
        };

        window.handlePrev = () => {
            if (state.currentExIndex > 0) {
                stopTimer();
                state.currentExIndex--;
                const queue = WEEKLY_PLAN[state.activeDay];
                const exercise = queue[state.currentExIndex];
                state.targetDuration = exercise.duration;
                state.timeLeft = exercise.duration;
                state.isRunning = false;
                state.isFinished = false;
                state.lastTick = -1;
                render();
            }
        };

        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        window.toggleTimer = () => {
            state.isRunning = !state.isRunning;
            if (state.isRunning) {
                stopTimer();
                state.timerInterval = setInterval(tickTimer, 1000);
            } else {
                stopTimer();
            }
            render(); 
        };

        window.resetTimer = () => {
            stopTimer();
            state.isRunning = false;
            state.timeLeft = state.targetDuration;
            state.isFinished = false;
            state.lastTick = -1;
            render();
        };

        window.adjustTime = (event, seconds) => {
            event.stopPropagation();
            if (state.isRunning) return;
            const newTarget = Math.max(5, state.targetDuration + seconds);
            const diff = newTarget - state.targetDuration;
            state.targetDuration = newTarget;
            state.timeLeft = Math.max(0, state.timeLeft + diff);
            updateTimerUI();
        };

        function tickTimer() {
            if (state.timeLeft > 0) {
                state.timeLeft--;
                if (state.timeLeft <= 5 && state.timeLeft > 0 && state.timeLeft !== state.lastTick) {
                    speak(state.timeLeft.toString());
                    state.lastTick = state.timeLeft;
                }
                if (state.timeLeft === 0) {
                    playChime();
                    state.isRunning = false;
                    state.isFinished = true;
                    stopTimer();
                    render(); 
                    return;
                }
                updateTimerUI();
            } else {
                state.isRunning = false;
                state.isFinished = true;
                stopTimer();
                render();
            }
        }

        function formatTime(secs, isFinished, targetDuration) {
            if (targetDuration < 60 && !isFinished) return secs; 
            if (isFinished) return `<i data-lucide="check" class="w-12 h-12 md:w-16 md:h-16 text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)] mx-auto"></i>`;
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function updateTimerUI() {
            const textEl = document.getElementById('timer-text');
            const circleEl = document.getElementById('timer-circle');
            if (!textEl || !circleEl) return;

            const radius = 100;
            const stroke = 12;
            const circumference = (radius - stroke * 2) * 2 * Math.PI;
            
            const dashOffset = state.targetDuration > 0 
                ? circumference - (state.timeLeft / state.targetDuration) * circumference 
                : circumference;

            const isUrgent = state.timeLeft <= 5 && state.timeLeft > 0;
            
            if (state.isFinished) {
                textEl.innerHTML = formatTime(state.timeLeft, true, state.targetDuration);
                lucide.createIcons();
                circleEl.setAttribute('class', 'stroke-cyan-400 drop-shadow-[0_0_12px_rgba(34,211,238,0.8)] transition-all duration-300 ease-linear');
            } else {
                textEl.innerText = formatTime(state.timeLeft, false, state.targetDuration);
                if (isUrgent) {
                    textEl.className = `absolute flex items-center justify-center w-full h-full ${state.targetDuration >= 600 ? 'text-4xl md:text-5xl' : 'text-5xl md:text-7xl'} font-system font-black tracking-tighter text-red-500 drop-shadow-[0_0_12px_rgba(239,68,68,0.8)]`;
                    circleEl.setAttribute('class', 'stroke-red-500 drop-shadow-[0_0_12px_rgba(239,68,68,0.8)] transition-all duration-300 ease-linear');
                } else {
                    textEl.className = `absolute flex items-center justify-center w-full h-full ${state.targetDuration >= 600 ? 'text-4xl md:text-5xl' : 'text-5xl md:text-7xl'} font-system font-black tracking-tighter text-zinc-50`;
                    circleEl.setAttribute('class', 'stroke-cyan-400 drop-shadow-[0_0_12px_rgba(34,211,238,0.8)] transition-all duration-300 ease-linear');
                }
            }
            circleEl.style.strokeDashoffset = dashOffset;
        }

        function getHomeHTML() {
            const pct = Math.round((state.completedDays.length / 7) * 100);
            
            let daysHTML = '';
            for(let day=1; day<=7; day++) {
                const isCompleted = state.completedDays.includes(day);
                const isCurrent = day === today && !isCompleted;
                
                let dayTitle = "DAILY QUEST";
                if (day === 1) dayTitle = "UPPER A (Width Day)";
                if (day === 2) dayTitle = "LOWER BODY";
                if (day === 3) dayTitle = "REST (Active)";
                if (day === 4) dayTitle = "UPPER B";
                if (day === 5) dayTitle = "GREEK GOD DAY";
                if (day === 6) dayTitle = "CARDIO + CORE";
                if (day === 7) dayTitle = "REST";

                let btnClass = isCompleted 
                    ? 'system-panel opacity-40 hover:opacity-80' 
                    : isCurrent 
                        ? 'system-panel-active transform scale-[1.02] z-10 relative' 
                        : 'system-panel hover:bg-cyan-900/40 hover:border-cyan-400';
                
                let subtitleClass = isCurrent ? 'text-cyan-400 text-glow' : 'text-zinc-500';
                let iconHTML = isCompleted 
                    ? '<i data-lucide="check" class="w-6 h-6 sm:w-8 sm:h-8 text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]"></i>'
                    : `<i data-lucide="chevron-right" class="w-6 h-6 sm:w-8 sm:h-8 transition-all duration-300 ${isCurrent ? 'text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]' : 'text-zinc-600 group-hover:text-cyan-400'}"></i>`;

                daysHTML += `
                    <button onclick="window.startWorkout(${day})" class="group w-full flex items-center justify-between p-4 sm:p-6 mb-3 rounded-lg transition-all duration-300 ${btnClass}">
                        <div class="text-left flex flex-col">
                            <span class="font-system text-[10px] sm:text-xs font-bold uppercase tracking-[0.2em] mb-1 md:mb-2 ${subtitleClass}">
                                ${isCompleted ? '[ CLEARED ]' : (isCurrent ? '[ URGENT QUEST ]' : `[ DAY 0${day} ]`)}
                            </span>
                            <span class="text-xl sm:text-2xl md:text-3xl font-bold uppercase tracking-wide text-zinc-100 ${isCompleted ? 'text-zinc-600' : ''}">
                                ${dayTitle}
                            </span>
                        </div>
                        <div class="flex items-center">
                            ${iconHTML}
                        </div>
                    </button>
                `;
            }

            return `
                <div class="flex-1 overflow-y-auto pb-12 w-full pt-10">
                    <header class="p-6 md:px-12 md:py-8">
                        <div class="flex justify-between items-start mb-6">
                            <div class="max-w-[80%]">
                                <p class="font-system text-cyan-500 text-[10px] sm:text-xs font-bold uppercase tracking-[0.2em] mb-2">[ SYSTEM MESSAGE ]</p>
                                <h1 class="text-4xl sm:text-5xl md:text-6xl font-black uppercase tracking-tighter leading-none mb-2 text-zinc-100 text-glow">
                                    PLAYER<br/>LEVELING
                                </h1>
                            </div>
                            <button onclick="window.resetProgress()" class="system-panel p-3 text-cyan-500 hover:text-cyan-300 hover:bg-cyan-900/30 rounded transition-colors border border-cyan-500/30" title="Reset Cache">
                                <i data-lucide="power" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                            </button>
                        </div>
                        
                        <div class="system-panel p-4 rounded-lg mt-8 border border-cyan-500/40 relative overflow-hidden">
                            <div class="absolute right-0 top-0 opacity-10 pointer-events-none">
                                <i data-lucide="zap" class="w-32 h-32 text-cyan-400"></i>
                            </div>
                            <div class="flex justify-between items-end mb-2 relative z-10">
                                <span class="font-system text-cyan-500 text-[10px] sm:text-xs font-bold uppercase tracking-[0.3em]">WEEKLY EXP</span>
                                <span class="font-system text-2xl sm:text-3xl font-black text-cyan-400 text-glow">${pct}%</span>
                            </div>
                            <div class="w-full h-1 sm:h-2 bg-zinc-900 border border-zinc-800 relative z-10">
                                <div class="h-full bg-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.8)] transition-all duration-1000 ease-out" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    </header>
                    
                    <main class="max-w-5xl mx-auto px-6">
                        <div class="py-4 flex items-center gap-3">
                            <div class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,211,238,1)]"></div>
                            <span class="font-system text-[10px] sm:text-xs font-bold uppercase tracking-[0.2em] text-cyan-500">QUEST LOG</span>
                        </div>
                        <div class="flex flex-col">
                            ${daysHTML}
                        </div>
                    </main>
                </div>
            `;
        }

        function getIntroHTML() {
            const dayId = state.activeDay;
            
            return `
                <div class="flex-1 flex flex-col items-center justify-center p-6 sm:p-8 text-center h-full w-full z-40">
                    <div class="system-panel-active p-8 rounded-xl animate-in fade-in zoom-in-95 duration-500 w-full max-w-lg border border-cyan-400">
                        <i data-lucide="zap" class="w-16 h-16 sm:w-20 sm:h-20 text-cyan-400 mx-auto mb-6 text-glow animate-pulse"></i>
                        <h3 class="font-system text-cyan-500 text-xs sm:text-sm font-bold tracking-[0.3em] uppercase mb-4">[ QUEST ACCEPTED ]</h3>
                        <h1 class="text-white text-5xl sm:text-7xl font-black uppercase tracking-tighter leading-none mb-8 text-glow">
                            ARISE.
                        </h1>
                        <button onclick="window.startPhase()" class="w-full group relative p-4 bg-cyan-500 shadow-[0_0_20px_rgba(34,211,238,0.6)] text-black text-xl sm:text-2xl font-black uppercase flex items-center justify-center gap-4 hover:bg-cyan-400 transition-all rounded">
                            <span>ENTER DUNGEON</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function getWorkoutHTML() {
            const queue = WEEKLY_PLAN[state.activeDay];
            const exercise = queue[state.currentExIndex];
            const totalInQueue = queue.length;
            const progressPercent = ((state.currentExIndex) / totalInQueue) * 100;
            const hasTimer = exercise.duration > 0;

            let daySelectorHTML = '';
            [1,2,3,4,5,6,7].forEach(d => {
                daySelectorHTML += `
                    <button onclick="window.changeDay(${d})" class="px-4 sm:px-6 py-3 text-left font-system text-xs font-bold text-cyan-500 uppercase tracking-widest hover:bg-cyan-900/50 hover:text-cyan-300 transition-all border-b border-cyan-900/30 last:border-0 w-full">
                        [ DAY ${d} ]
                    </button>
                `;
            });

            let displayHTML = '';
            if (hasTimer) {
                const radius = 100;
                const stroke = 12;
                const normalizedRadius = radius - stroke * 2;
                
                let controlsHTML = '';
                if (!state.isRunning && !state.isFinished) {
                    controlsHTML = `
                        <div class="flex system-panel rounded overflow-hidden mt-6 mx-auto justify-center max-w-sm border border-cyan-500/30">
                           <button onclick="window.adjustTime(event, -60)" class="px-3 py-2 bg-transparent text-cyan-600 hover:text-cyan-400 hover:bg-cyan-900/30 font-system text-[10px] font-bold border-r border-cyan-900/50">-1M</button>
                           <button onclick="window.adjustTime(event, -15)" class="px-3 py-2 bg-transparent text-cyan-600 hover:text-cyan-400 hover:bg-cyan-900/30 font-system text-[10px] font-bold border-r border-cyan-900/50">-15S</button>
                           <div class="px-4 py-2 bg-cyan-950/50 text-cyan-500 font-system text-[10px] font-bold tracking-[0.2em] flex items-center justify-center uppercase">T-ADJ</div>
                           <button onclick="window.adjustTime(event, 15)" class="px-3 py-2 bg-transparent text-cyan-600 hover:text-cyan-400 hover:bg-cyan-900/30 font-system text-[10px] font-bold border-l border-cyan-900/50">+15S</button>
                           <button onclick="window.adjustTime(event, 60)" class="px-3 py-2 bg-transparent text-cyan-600 hover:text-cyan-400 hover:bg-cyan-900/30 font-system text-[10px] font-bold border-l border-cyan-900/50">+1M</button>
                        </div>
                    `;
                }

                displayHTML = `
                    <div onclick="window.toggleTimer()" class="cursor-pointer group w-full mt-2 sm:mt-4 flex flex-col items-center">
                        <div class="relative flex items-center justify-center w-full max-w-[200px] sm:max-w-[250px] aspect-square mx-auto">
                            <svg height="100%" width="100%" viewBox="0 0 ${radius * 2} ${radius * 2}" class="transform -rotate-90">
                                <circle stroke="rgba(34,211,238,0.1)" strokeWidth="${stroke}" fill="transparent" r="${normalizedRadius}" cx="${radius}" cy="${radius}" />
                                <circle id="timer-circle" stroke="currentColor" class="stroke-cyan-400 drop-shadow-[0_0_12px_rgba(34,211,238,0.8)] transition-all duration-300 ease-linear" strokeWidth="${stroke}" fill="transparent" r="${normalizedRadius}" cx="${radius}" cy="${radius}" strokeLinecap="butt" />
                            </svg>
                            <div id="timer-text" class="absolute flex items-center justify-center w-full h-full ${state.targetDuration >= 600 ? 'text-4xl sm:text-5xl' : 'text-5xl sm:text-6xl md:text-7xl'} font-system font-black tracking-tighter text-zinc-50">
                            </div>
                        </div>
                        <div class="text-center mt-4 sm:mt-8 font-system text-[10px] sm:text-xs font-bold text-cyan-600 uppercase tracking-widest group-hover:text-cyan-400 transition">
                            [ ${state.isRunning ? 'SYSTEM: RUNNING' : 'SYSTEM: PAUSED'} ]
                        </div>
                    </div>
                    ${controlsHTML}
                `;
            } else {
                displayHTML = `
                    <div class="flex flex-col items-center justify-center mt-2 sm:mt-4">
                        <span class="font-system text-6xl sm:text-7xl md:text-8xl leading-none font-black text-cyan-400 text-glow tracking-tighter text-center">
                            ${exercise.reps}
                        </span>
                        <span class="font-system text-sm sm:text-base font-bold uppercase tracking-[0.2em] text-cyan-600 mt-4 sm:mt-6">
                            [ TARGET REP RANGE ]
                        </span>
                    </div>
                `;
            }

            let actionBtn = '';
            if (hasTimer && !state.isFinished) {
                let btnClasses = state.isRunning 
                    ? "bg-transparent border border-cyan-500 text-cyan-400 hover:bg-cyan-900/30"
                    : "bg-cyan-500 shadow-[0_0_20px_rgba(34,211,238,0.6)] text-black hover:bg-cyan-400";
                actionBtn = `
                    <button onclick="window.toggleTimer()" class="col-span-2 flex items-center justify-center p-3 sm:p-4 text-base sm:text-lg font-system font-bold uppercase tracking-tighter transition-all rounded ${btnClasses}">
                        ${state.isRunning ? '[ PAUSE ]' : '[ INITIATE ]'}
                    </button>
                `;
            } else {
                actionBtn = `
                    <button onclick="window.handleNext()" class="col-span-2 flex items-center justify-center p-3 sm:p-4 text-base sm:text-lg font-system font-bold uppercase tracking-tighter transition-all bg-cyan-400 text-black hover:bg-cyan-300 shadow-[0_0_15px_rgba(34,211,238,0.6)] rounded">
                        [ ${hasTimer ? 'PROCEED' : 'CLEAR'} ]
                    </button>
                `;
            }

            return `
                <div class="flex flex-col h-full relative w-full overflow-hidden">
                    <!-- Progress Bar -->
                    <div class="absolute top-0 left-0 h-1 bg-zinc-900 w-full z-20">
                        <div class="h-full bg-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.8)] transition-all duration-500" style="width: ${progressPercent}%"></div>
                    </div>

                    <!-- Top Navigation -->
                    <div class="w-full flex justify-between items-start z-40 p-4 pt-6">
                        <button onclick="window.exitWorkout()" class="system-panel text-cyan-500 hover:text-cyan-300 p-2 sm:p-3 rounded transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                        </button>

                        <div class="relative">
                            <button onclick="window.toggleDaySelector()" class="flex items-center gap-2 sm:gap-3 px-4 sm:px-6 py-2 sm:py-3 system-panel text-cyan-400 font-system font-bold text-[10px] sm:text-sm tracking-widest uppercase hover:bg-cyan-900/30 rounded transition-colors">
                                <span>SYSTEM MENU</span>
                                <i id="day-selector-chevron" data-lucide="chevron-down" class="w-3 h-3 sm:w-4 sm:h-4 transform transition ${state.showDaySelector ? 'rotate-180' : ''}"></i>
                            </button>
                            
                            <div id="day-selector-dropdown" class="${state.showDaySelector ? '' : 'hide'} absolute top-full right-0 mt-2 w-48 sm:w-56 system-panel rounded flex flex-col shadow-[0_10px_30px_rgba(0,0,0,0.8)] z-50 max-h-[60vh] overflow-y-auto">
                                ${daySelectorHTML}
                            </div>
                        </div>
                    </div>

                    <!-- Main Content Area -->
                    <div class="flex-1 flex flex-col z-10 p-4 sm:p-6 md:p-8 overflow-y-auto justify-center">
                        <div class="system-panel p-6 sm:p-8 rounded-lg border border-cyan-500/50 w-full max-w-2xl mx-auto">
                            
                            <div class="flex justify-between items-center mb-6 pb-4 border-b border-cyan-900/50">
                                <span class="font-system text-cyan-600 text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase">
                                    [ TASK ${state.currentExIndex + 1}/${totalInQueue} ]
                                </span>
                                <span class="font-system text-cyan-400 text-[10px] md:text-xs font-bold tracking-[0.2em] uppercase text-glow">
                                    DAY 0${state.activeDay}
                                </span>
                            </div>

                            <div class="mb-4 sm:mb-8 text-center md:text-left">
                                <h2 class="text-2xl sm:text-4xl md:text-5xl font-black uppercase tracking-tight leading-tight mb-2 sm:mb-4 text-zinc-100">
                                    ${exercise.name}
                                </h2>
                                <p class="font-system text-cyan-300 text-xs sm:text-sm md:text-base font-medium border-l-2 border-cyan-500 pl-3 sm:pl-4 text-left mx-auto md:mx-0 opacity-80">
                                    > ${exercise.description}
                                </p>
                            </div>

                            <div class="flex-1 flex flex-col items-center justify-center w-full">
                                ${displayHTML}
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Controls -->
                    <div class="w-full p-4 z-20 pb-4 sm:pb-8">
                        <div class="grid grid-cols-4 gap-2 md:gap-4 max-w-2xl mx-auto">
                            <button onclick="window.handlePrev()" class="col-span-1 flex items-center justify-center p-3 sm:p-4 system-panel text-cyan-500 hover:text-cyan-300 hover:bg-cyan-900/30 rounded transition-colors font-system uppercase font-bold text-[10px] sm:text-xs tracking-widest">
                                <i data-lucide="skip-back" class="w-5 h-5 sm:w-6 sm:h-6 md:mr-2"></i> <span class="hidden md:inline">PREV</span>
                            </button>

                            ${actionBtn}

                            <button onclick="window.resetTimer()" class="col-span-1 flex items-center justify-center p-3 sm:p-4 system-panel text-cyan-500 hover:text-cyan-300 hover:bg-cyan-900/30 rounded transition-colors font-system uppercase font-bold text-[10px] sm:text-xs tracking-widest">
                                <i data-lucide="rotate-ccw" class="w-5 h-5 sm:w-6 sm:h-6 md:mr-2"></i> <span class="hidden md:inline">RESET</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getCompletedHTML() {
            return `
                <div class="flex-1 h-full bg-black flex flex-col items-center justify-center text-white p-6 sm:p-8 text-center w-full relative">
                    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-900/20 via-black to-black"></div>
                    
                    <div class="animate-in fade-in slide-in-from-bottom-8 duration-700 flex flex-col items-center w-full max-w-xl relative z-10 system-panel-active p-12 rounded-xl border border-cyan-400">
                        <div class="mb-8">
                            <i data-lucide="shield-check" class="w-20 h-20 sm:w-24 sm:h-24 text-cyan-400 text-glow animate-pulse mx-auto"></i>
                        </div>
                        <h1 class="text-4xl sm:text-6xl md:text-7xl font-black uppercase tracking-tighter mb-4 text-glow">QUEST CLEARED</h1>
                        <p class="font-system text-cyan-500 text-sm sm:text-base tracking-[0.2em] uppercase font-bold mb-12">[ REWARDS DISTRIBUTED. REST RECOMENDED. ]</p>
                        <button onclick="window.returnHome()" class="w-full bg-cyan-500 text-black py-4 sm:py-5 text-lg sm:text-xl font-system font-bold uppercase tracking-widest hover:bg-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.6)] transition-all rounded">
                            [ RETURN TO SYSTEM ]
                        </button>
                    </div>
                </div>
            `;
        }

        // Initialize App
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
